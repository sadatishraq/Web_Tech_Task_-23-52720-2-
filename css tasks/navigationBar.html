<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name = "author" content="Mohammed Sadat Ishraq Labib">
        <meta name = "description" content="Navigation Bar Styling">
        <title>Navigation Bar</title>

        <style>
            nav{
                background-color: lightgray;
                padding: 10px;
                width: 100%;

            }

            nav a{
                display: inline-block;
                padding: 10px;
                margin: 10px;
                text-decoration: none;
                color: black
            }
            
            nav a:hover{
                background-color: gray;
                color: white;

            }
        </style>
    </head>
    <body>
        <nav>
            <a href = "#">Home</a>
            <a href = "#">About</a>
            <a href = "#">Service</a>
            <a href = "#">Gallery</a>
            <a href = "#">Contact</a>
        </nav>
    </body>

</html>
